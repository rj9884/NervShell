<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NervShell - AI Agent</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">NS</div>
          <span class="logo-text">NervShell</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <button id="new-chat-btn" class="nav-btn primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New Chat
        </button>
        <button id="clear-btn" class="nav-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
          Clear History
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="model-badge">
          <span class="status-dot"></span>
          <span id="model-name">OpenRouter</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="chat-section">
        <div class="chat-container" id="output">
          <div class="welcome-container">
            <div class="welcome-message">
              <h1>NervShell</h1>
              <p>Ask anything. Run commands. Control your system.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="input-section">
        <div class="input-container">
          <div class="input-wrapper">
            <input type="text" id="input" class="main-input" placeholder="Ask NervShell to do something..."
              autocomplete="off">
            <button id="send-btn" class="send-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
          <p class="input-hint">Press Enter to send • Type a command or ask a question</p>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>

</html>
