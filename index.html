<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NervShell - AI Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/client/styles/main.css">
</head>

<body class="bg-bg-dark text-white h-screen overflow-hidden antialiased font-sans">
  <div class="mesh-bg"></div>
  <div class="flex h-screen app p-4 gap-4">
    <!-- Sidebar -->
    <aside class="sidebar w-[300px] glass-panel rounded-xl flex flex-col p-6 gap-6 z-10 transition-premium">
      <div class="mb-4 sidebar-header">
        <div class="flex items-center gap-3 logo">
          <div
            class="flex items-center justify-center w-10 h-10 font-semibold text-white rounded-lg logo-icon bg-accent-gradient font-mono text-[14px] shadow-glow">
            NS</div>
          <span
            class="text-xl font-bold logo-text tracking-tight bg-accent-gradient bg-clip-text text-transparent">NervShell</span>
        </div>
      </div>

      <nav class="flex flex-col flex-1 gap-2 sidebar-nav">
        <button id="new-chat-btn"
          class="flex items-center justify-center gap-3 px-4 py-3.5 text-sm font-semibold text-white transition-premium rounded-lg shadow-glow nav-btn bg-accent-gradient hover:brightness-110 active:scale-95">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New Session
        </button>

        <div class="mt-8 space-y-4">
          <h3 class="px-4 text-[10px] font-bold tracking-[0.2em] text-white/30 uppercase">Capabilities</h3>
          <div id="feature-list" class="space-y-1">
            <!-- Dynamic features populated by JS -->
          </div>
        </div>

        <div class="mt-auto space-y-2">
          <button id="clear-btn"
            class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium transition-premium rounded-lg nav-btn text-white/40 hover:bg-white/5 hover:text-white/70 active:scale-95">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            Purge Context
          </button>
        </div>
      </nav>

      <div class="pt-4 border-t border-white/5 sidebar-footer">
        <div class="flex items-center gap-3 px-4 py-2.5 text-xs rounded-lg glass-panel bg-white/2">
          <span class="w-2 h-2 rounded-full bg-accent shadow-glow animate-pulse"></span>
          <span id="model-name" class="font-medium text-white/60">GPT-4 Omni</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="relative flex flex-col flex-1 overflow-hidden main h-full">
      <div class="flex flex-col flex-1 overflow-hidden chat-section rounded-xl relative">
        <div id="output"
          class="flex flex-col flex-1 gap-8 overflow-y-auto px-10 py-10 pb-[160px] chat-container scrollbar-premium">
          <div class="flex flex-col items-center justify-center welcome-container h-[50vh]">
            <div class="text-center welcome-message">
              <h1
                class="text-7xl font-bold tracking-tighter mb-6 bg-accent-gradient bg-clip-text text-transparent opacity-0 animate-[fade-in_1s_ease-out_forwards]">
                NervShell</h1>
              <p
                class="mx-auto text-xl font-medium tracking-tight max-w-lg text-white/40 opacity-0 animate-[fade-in_1s_ease-out_0.2s_forwards]">
                Autonomous intelligence for your terminal environment.
              </p>
            </div>
          </div>
        </div>

        <!-- Input Area (Floating) -->
        <div class="absolute bottom-0 left-0 right-0 z-10 p-10 pointer-events-none input-section">
          <div class="w-full mx-auto max-w-[850px] pointer-events-auto">
            <div
              class="relative flex items-center p-2 rounded-xl transition-premium glass-panel focus-within:ring-2 focus-within:ring-accent/40 focus-within:-translate-y-1.5 group">
              <input type="text" id="input"
                class="flex-1 px-6 py-5 text-lg bg-transparent border-none outline-none main-input text-white placeholder-white/20 font-medium"
                placeholder="Initialize command sequence..." autocomplete="off">
              <button id="send-btn"
                class="flex items-center justify-center w-14 h-14 mr-1 text-white transition-premium rounded-lg shadow-glow send-btn bg-accent-gradient hover:brightness-110 hover:scale-105 active:scale-95">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2"></path>
                </svg>
              </button>
            </div>
            <p class="mt-4 text-[10px] text-center tracking-widest uppercase font-bold text-white/20">system status:
              ready • secure link established</p>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="./src/client/app.ts"></script>
</body>

</html>
